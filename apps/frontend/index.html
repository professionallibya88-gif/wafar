<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark light" />
  <meta
    name="description"
    content="منصة وفر المتخصصة في قطع غيار السيارات للسوق الليبي"
  />
  <title>منصة وفر</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    id="google-font-link"
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bootstrap-bg-light: #fafafa;
      --bootstrap-bg-dark: #0a0a0a;
      --bootstrap-surface-light: rgba(255, 255, 255, 0.88);
      --bootstrap-surface-dark: rgba(17, 24, 39, 0.72);
      --bootstrap-border-light: rgba(15, 23, 42, 0.08);
      --bootstrap-border-dark: rgba(148, 163, 184, 0.16);
      --bootstrap-text-light: #0f172a;
      --bootstrap-text-dark: #f8fafc;
      --bootstrap-text-muted-light: #475569;
      --bootstrap-text-muted-dark: #94a3b8;
      --bootstrap-accent: #2563eb;
      --font-sans:
        "Tajawal", "Noto Sans Arabic", "Inter", "Segoe UI", system-ui,
        -apple-system, sans-serif;
      --font-display:
        "Tajawal", "Noto Sans Arabic", "Poppins", "Segoe UI", sans-serif;
      --site-font-family:
        "Tajawal", "Noto Sans Arabic", "Inter", "Segoe UI", system-ui,
        -apple-system, sans-serif;
    }

    html {
      direction: rtl;
      background-color: var(--bootstrap-bg-light);
      color: var(--bootstrap-text-light);
      color-scheme: light;
    }

    html.dark {
      background-color: var(--bootstrap-bg-dark);
      color: var(--bootstrap-text-dark);
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: inherit;
      color: inherit;
      overflow-x: hidden;
      font-family: var(--font-sans);
    }

    #app {
      min-height: 100vh;
      opacity: 0;
    }

    html[data-app-ready="true"] #app {
      opacity: 1;
    }

    #app-bootstrap-shell {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background-color: var(--bootstrap-bg-light);
      transition:
        opacity 180ms ease,
        visibility 180ms ease;
    }

    html.dark #app-bootstrap-shell {
      background-color: var(--bootstrap-bg-dark);
    }

    html[data-app-ready="true"] #app-bootstrap-shell {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .bootstrap-spinner {
      position: relative;
      width: 36px;
      height: 36px;
    }

    .bootstrap-spinner::before,
    .bootstrap-spinner::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .bootstrap-spinner::before {
      inset: 10%;
      border-top-color: #2563eb;
      border-right-color: #2563eb;
      animation: bootstrap-spinner-spin 0.86s linear infinite;
    }

    html.dark .bootstrap-spinner::before {
      border-top-color: #60a5fa;
      border-right-color: #60a5fa;
    }

    .bootstrap-spinner::after {
      inset: 25%;
      border-bottom-color: #1d4ed8;
      border-left-color: #1d4ed8;
      animation: bootstrap-spinner-spin-reverse 0.78s linear infinite;
    }

    html.dark .bootstrap-spinner::after {
      border-bottom-color: #3b82f6;
      border-left-color: #3b82f6;
    }

    html[data-bootstrap-transitions="off"] *,
    html[data-bootstrap-transitions="off"] *::before,
    html[data-bootstrap-transitions="off"] *::after {
      transition-property: none !important;
      transition-duration: 0s !important;
      transition-delay: 0s !important;
    }

    @keyframes bootstrap-spinner-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes bootstrap-spinner-spin-reverse {
      to {
        transform: rotate(-360deg);
      }
    }
  </style>
  <script>
    (() => {
      const root = document.documentElement;
      const metaThemeColor = document.querySelector('meta[name="theme-color"]');
      const defaultThemeMode = "dark";
      const defaultTheme = "dark";
      const defaultFont =
        '"Tajawal", "Noto Sans Arabic", "Inter", "Segoe UI", system-ui, -apple-system, sans-serif';

      const getSystemTheme = () =>
        window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";

      const readStoredTheme = () => {
        try {
          const storedTheme = window.localStorage.getItem("theme");
          if (storedTheme === "light" || storedTheme === "dark" || storedTheme === "system") {
            return storedTheme;
          }
        } catch (error) {
          return defaultThemeMode;
        }

        return defaultThemeMode;
      };

      const applyTheme = (resolvedTheme, themeMode) => {
        const activeTheme = resolvedTheme === "light" ? "light" : defaultTheme;
        root.classList.toggle("dark", activeTheme === "dark");
        root.setAttribute("data-theme", activeTheme);
        root.setAttribute(
          "data-theme-source",
          themeMode === "system" ? "system" : "manual",
        );
        root.style.colorScheme = activeTheme;

        if (metaThemeColor) {
          metaThemeColor.setAttribute(
            "content",
            activeTheme === "dark" ? "#0a0a0a" : "#f8f9fa",
          );
        }
      };

      const setFontFamily = (fontFamily) => {
        root.style.setProperty("--site-font-family", fontFamily);
        root.style.setProperty("--font-sans", fontFamily);
        root.style.setProperty("--font-display", fontFamily);
      };

      const themeMode = readStoredTheme();
      const resolvedTheme = themeMode === "system" ? getSystemTheme() : themeMode;

      root.setAttribute("data-app-ready", "false");
      root.setAttribute("data-bootstrap-transitions", "off");
      setFontFamily(defaultFont);
      applyTheme(resolvedTheme, themeMode);

      window.__WAFAR_BOOTSTRAP__ = {
        themeMode,
        resolvedTheme,
        applyTheme(nextResolvedTheme, nextThemeMode = themeMode) {
          const safeThemeMode =
            nextThemeMode === "light" ||
            nextThemeMode === "dark" ||
            nextThemeMode === "system"
              ? nextThemeMode
              : defaultThemeMode;
          const safeResolvedTheme =
            nextResolvedTheme === "light" || nextResolvedTheme === "dark"
              ? nextResolvedTheme
              : safeThemeMode === "system"
                ? getSystemTheme()
                : safeThemeMode;

          this.themeMode = safeThemeMode;
          this.resolvedTheme = safeResolvedTheme;
          applyTheme(safeResolvedTheme, safeThemeMode);
        },
        setFontFamily,
        releaseTransitions() {
          root.removeAttribute("data-bootstrap-transitions");
        },
        markAppReady() {
          root.setAttribute("data-app-ready", "true");
          window.setTimeout(() => {
            const shell = document.getElementById("app-bootstrap-shell");
            if (shell) {
              shell.remove();
            }
          }, 220);
        },
      };
    })();
  </script>
</head>
<body dir="rtl">
  <div id="app"></div>
  <div id="app-bootstrap-shell" aria-hidden="true">
    <div class="bootstrap-spinner"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
