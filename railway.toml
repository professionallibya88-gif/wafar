[build]
builder = "RAILPACK"
buildCommand = "if [ -f apps/backend/package.json ]; then npm install && npm run build:backend; else npm install && npm run build; fi"

[deploy]
startCommand = "if [ -f apps/backend/package.json ]; then cd apps/backend && npm run db:migrate:prod && npm run db:seed:prod && cd ../.. && node apps/backend/dist/server.js; else npm run db:migrate:prod && npm run db:seed:prod && node dist/server.js; fi"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
